<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories ❤️</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

/* TITLE */

.title{
position:absolute;
top:25px;
width:100%;
text-align:center;
color:white;
font-size:26px;
font-weight:600;
text-shadow:0 0 20px pink;
z-index:10;
}

/* PHOTO FRAME */

.frame{
width:320px;
height:420px;
border:6px solid #ff6b9d;
border-radius:20px;
box-shadow:
0 0 15px #ff6b9d,
0 0 40px #ff6b9d;
overflow:hidden;
background:#111;
position:relative;
}

/* IMAGE */

.frame img{
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1.2s;
}

/* HEARTS */

.heart{
position:fixed;
bottom:-20px;
color:#ff4d6d;
font-size:20px;
animation:floatUp linear forwards;
}

@keyframes floatUp{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-110vh);
opacity:0;
}

}

</style>
</head>

<body>

<div class="title">Our Memories ❤️</div>

<div class="frame">
<img id="image">
</div>

<script>

/* IMAGE LIST */

const images = [

/* 2 months */
...Array.from({length:30},(_,i)=>`2months/picture${i+1}.png`),
...Array.from({length:30},(_,i)=>`2months/picture${i+1}.jpg`),

/* 3 months */
...Array.from({length:14},(_,i)=>`3months/image${i+1}.png`),
...Array.from({length:14},(_,i)=>`3months/image${i+1}.jpg`),

/* Valentines */
...Array.from({length:91},(_,i)=>`ValentinesImages/picture${i+1}.png`),
...Array.from({length:91},(_,i)=>`ValentinesImages/picture${i+1}.jpg`)

];

let lastIndex = -1;
const img = document.getElementById("image");

/* RANDOM IMAGE */

function showRandom(){

let index;

do{
index = Math.floor(Math.random()*images.length);
}
while(index === lastIndex);

lastIndex = index;

const nextImage = new Image();

nextImage.onload = function(){

img.style.opacity = 0;

setTimeout(()=>{
img.src = nextImage.src;
img.style.opacity = 1;
},300);

};

nextImage.onerror = showRandom;

nextImage.src = images[index];

}

/* START */

showRandom();
setInterval(showRandom,4000);

/* TAP TO CHANGE IMAGE */

document.body.onclick = showRandom;


/* HEARTS */

function heart(){

const h = document.createElement("div");

h.className = "heart";
h.innerHTML = "❤";

h.style.left = Math.random()*100+"vw";
h.style.fontSize = (Math.random()*20+15)+"px";
h.style.animationDuration = (Math.random()*3+4)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),7000);

}

setInterval(heart,300);

</script>

</body>
</html>
